<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Game Sphere Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; width: 100%; }
        .form-card {
            background: white;
            padding: 35px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .form-card .logo { text-align: center; margin-bottom: 25px; }
        .form-card .logo h1 { color: #1a1a2e; font-size: 24px; }
        .form-card .logo p { color: #7f8c8d; font-size: 14px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
            background: white;
        }
        .btn-primary {
            background: #3498db;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #2980b9; }
        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        .form-footer a { color: #3498db; text-decoration: none; font-weight: 600; }
        .form-footer a:hover { text-decoration: underline; }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 13px;
        }
        .back-link a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="logo">
                <h1>🌠 Game Sphere Network</h1>
                <p>Login to Your Account</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div id="message" class="message"></div>

            <div class="form-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // ===== DATABASE FUNCTIONS =====
        const DB = {
            getAll: function(collection) {
                try {
                    const data = localStorage.getItem(collection);
                    return data ? JSON.parse(data) : [];
                } catch (e) { return []; }
            },
            saveAll: function(collection, data) {
                localStorage.setItem(collection, JSON.stringify(data));
            },
            findByField: function(collection, field, value) {
                const data = this.getAll(collection);
                return data.find(item => item[field] === value) || null;
            },
            insert: function(collection, record) {
                const data = this.getAll(collection);
                record.id = 'USR-' + String(data.length + 1).padStart(4, '0');
                data.push(record);
                this.saveAll(collection, data);
                return record;
            }
        };

        // ===== INIT DATABASE =====
        function initDatabase() {
            if (localStorage.getItem('initiated') === 'true') return;

            const admin = {
                id: 'USR-0001',
                username: 'admin',
                email: 'admin@gamesphere.com',
                password: 'admin123',
                fullName: 'System Administrator',
                role: 'admin',
                balance: 0,
                membershipPaid: 'yes',
                membershipType: 'full',
                registrationDate: new Date().toISOString(),
                isBanned: 'no',
                violationCount: 0,
                referralCode: 'ADMIN001',
                totalReferrals: 0,
                points: 0,
                withdrawalCount: 0
            };
            DB.insert('users', admin);

            const demo = {
                id: 'USR-0002',
                username: 'demo_member',
                email: 'demo@gamesphere.com',
                password: 'demopass',
                fullName: 'Demo Member',
                role: 'member',
                balance: 150,
                membershipPaid: 'yes',
                membershipType: 'full',
                registrationDate: new Date().toISOString(),
                isBanned: 'no',
                violationCount: 0,
                referralCode: 'DEMO001',
                totalReferrals: 2,
                points: 250,
                withdrawalCount: 0
            };
            DB.insert('users', demo);

            // Announcements
            const announcements = [
                { title: '🎉 Welcome to Game Sphere Network!', content: 'Our platform officially launched on June 14, 2026!', priority: 1, dateCreated: new Date().toISOString() },
                { title: '📅 Birthday Promo Extended!', content: 'Birthday Promo fee of ₱150 extended until August 20, 2026.', priority: 1, dateCreated: new Date().toISOString() },
                { title: '📢 Withdrawal Schedule', content: 'Requests Wed-Fri. Approved list Sat. Release Sun 5PM-8PM.', priority: 2, dateCreated: new Date().toISOString() }
            ];
            announcements.forEach(ann => {
                const data = DB.getAll('announcements');
                ann.id = 'AN-' + String(data.length + 1).padStart(4, '0');
                data.push(ann);
                DB.saveAll('announcements', data);
            });

            localStorage.setItem('gsnRate', '1');
            localStorage.setItem('initiated', 'true');
        }
        initDatabase();

        // ===== LOGIN =====
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            if (!email || !password) {
                msg.className = 'message error';
                msg.textContent = 'Please enter email and password!';
                return;
            }

            const user = DB.findByField('users', 'email', email);

            if (!user) {
                msg.className = 'message error';
                msg.textContent = 'No account found with this email!';
                return;
            }

            if (user.password !== password) {
                msg.className = 'message error';
                msg.textContent = 'Invalid password!';
                return;
            }

            if (user.isBanned === 'yes') {
                msg.className = 'message error';
                msg.textContent = '⛔ Your account is banned. Contact support!';
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify(user));

            msg.className = 'message success';
            msg.textContent = '✅ Welcome back, ' + user.username + '!';

            setTimeout(() => {
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'member.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
