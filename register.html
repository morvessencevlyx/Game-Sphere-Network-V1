<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Game Sphere Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; width: 100%; }
        .form-card {
            background: white;
            padding: 35px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .form-card .logo { text-align: center; margin-bottom: 25px; }
        .form-card .logo h1 { color: #1a1a2e; font-size: 24px; }
        .form-card .logo p { color: #7f8c8d; font-size: 14px; }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
            background: #fafafa;
        }
        .form-group input:focus {
            border-color: #3498db;
            outline: none;
            background: white;
        }
        .form-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .btn-primary {
            background: #3498db;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #2980b9; }
        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }
        .form-footer a { color: #3498db; text-decoration: none; font-weight: 600; }
        .form-footer a:hover { text-decoration: underline; }
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 13px;
        }
        .back-link a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <div class="logo">
                <h1>🌠 Game Sphere Network</h1>
                <p>Create Your Account</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="agreeTerms" required>
                        I agree to the Terms & Conditions
                    </label>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div id="message" class="message"></div>

            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // ===== DATABASE FUNCTIONS =====
        const DB = {
            getAll: function(collection) {
                try {
                    const data = localStorage.getItem(collection);
                    return data ? JSON.parse(data) : [];
                } catch (e) { return []; }
            },
            saveAll: function(collection, data) {
                localStorage.setItem(collection, JSON.stringify(data));
            },
            findByField: function(collection, field, value) {
                const data = this.getAll(collection);
                return data.find(item => item[field] === value) || null;
            },
            insert: function(collection, record) {
                const data = this.getAll(collection);
                record.id = 'USR-' + String(data.length + 1).padStart(4, '0');
                data.push(record);
                this.saveAll(collection, data);
                return record;
            }
        };

        // ===== INIT DATABASE =====
        function initDatabase() {
            if (localStorage.getItem('initiated') === 'true') return;
            const admin = {
                id: 'USR-0001',
                username: 'admin',
                email: 'admin@gamesphere.com',
                password: 'admin123',
                fullName: 'System Administrator',
                role: 'admin',
                balance: 0,
                membershipPaid: 'yes',
                membershipType: 'full',
                registrationDate: new Date().toISOString(),
                isBanned: 'no',
                violationCount: 0,
                referralCode: 'ADMIN001',
                totalReferrals: 0,
                points: 0,
                withdrawalCount: 0
            };
            DB.insert('users', admin);
            localStorage.setItem('initiated', 'true');
        }
        initDatabase();

        // ===== REGISTER =====
        function handleRegister(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            const msg = document.getElementById('message');

            if (!fullName || !username || !email || !password || !confirmPassword) {
                msg.className = 'message error';
                msg.textContent = 'Please fill in all fields!';
                return;
            }

            if (password.length < 6) {
                msg.className = 'message error';
                msg.textContent = 'Password must be at least 6 characters!';
                return;
            }

            if (password !== confirmPassword) {
                msg.className = 'message error';
                msg.textContent = 'Passwords do not match!';
                return;
            }

            if (!agreeTerms) {
                msg.className = 'message error';
                msg.textContent = 'Please agree to the Terms & Conditions!';
                return;
            }

            if (DB.findByField('users', 'email', email)) {
                msg.className = 'message error';
                msg.textContent = 'Email already registered!';
                return;
            }

            if (DB.findByField('users', 'username', username)) {
                msg.className = 'message error';
                msg.textContent = 'Username already taken!';
                return;
            }

            const newUser = {
                username: username,
                email: email,
                password: password,
                fullName: fullName,
                role: 'member',
                balance: 0,
                membershipPaid: 'no',
                membershipType: 'none',
                registrationDate: new Date().toISOString(),
                isBanned: 'no',
                violationCount: 0,
                referralCode: username.substring(0, 3).toUpperCase() + Math.floor(100 + Math.random() * 900),
                totalReferrals: 0,
                points: 0,
                withdrawalCount: 0
            };

            const savedUser = DB.insert('users', newUser);
            localStorage.setItem('currentUser', JSON.stringify(savedUser));

            msg.className = 'message success';
            msg.textContent = '✅ Account created successfully! Redirecting...';

            setTimeout(() => {
                window.location.href = 'member.html';
            }, 1500);
        }
    </script>
</body>
</html>
